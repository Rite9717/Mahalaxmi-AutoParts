spring.application.name=mahalaxmi-autoparts-web
server.port=8080

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/mahalaxmi_web?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false

spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

app.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173
app.admin.password=${ADMIN_PASSWORD:1234}

ollama_base_url=http://localhost:11434
ollama_model=llama3.2:3b
